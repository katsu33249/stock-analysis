name: Phase 2 Debug Test

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl numpy pyarrow

      - name: Update J-Quants Cache
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          python3 jquants_data_manager.py
      
      - name: Run Debug Test
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          python3 advanced_architecture_phase2_debug.py
      
      - name: Show logs
        if: always()
        run: |
          echo "=== デバッグ完了 ==="
