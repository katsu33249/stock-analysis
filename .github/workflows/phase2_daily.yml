name: Phase 2 Daily Screening

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config_phase2.json'
      - 'advanced_architecture_phase2.py'

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl numpy
      
      - name: Validate config
        run: |
          python3 -m json.tool config_phase2.json > /dev/null && echo "✅ Config is valid"
      
      - name: Run Phase 2 Screening
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 advanced_architecture_phase2.py
      
      - name: Upload results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-results
          path: |
            results/
            snapshots/
            logs/
          retention-days: 30
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-logs
          path: logs/
          retention-days: 7
