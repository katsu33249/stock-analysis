name: Phase 1 Daily Screening

on:
  schedule:
    - cron: '13 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl numpy
      
      - name: Run config_runner
        run: python3 config_runner.py
      
      - name: Success
        run: echo "✅ Phase 1 Screening Completed"
