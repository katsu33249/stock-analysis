name: Phase 1 Daily Screening

on:
  # 毎日 22:00 JST（UTC+9）に実行
  schedule:
    - cron: '13 22 * * *'
  # 手動実行も可能
  workflow_dispatch:
  # main ブランチへの push 時も実行（テスト用）
  push:
    branches:
      - main
    paths:
      - 'config_phase1.json'
      - 'config_runner.py'
      - 'advanced_architecture.py'

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: コードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Python をセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # Step 3: 依存関係をインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl numpy
      
      # Step 4: 設定ファイルを検証
      - name: Validate config
        run: |
          python3 -m json.tool config_phase1.json > /dev/null && echo "✅ Config is valid"
      
      # Step 5: 企業データを抽出
      - name: Extract companies
        run: |
          python3 config_runner.py
      
      # Step 6: Phase 1 を実行
      - name: Run Phase 1 Screening
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          python3 advanced_architecture.py
      
      # Step 7: 結果をアップロード
      - name: Upload results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-results
          path: |
            results/
            snapshots/
            logs/
          retention-days: 30
      
      # Step 8: 実行ログをアップロード
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-logs
          path: logs/
          retention-days: 7
      
　　　　# Step 9: 成功時の通知（Discord Webhook）
      - name: Notify success to Discord
        if: success()
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: "✅ Phase 1 Screening Completed"
          description: |
            企業データ抽出: ✅ 完了
            Strategy 実行: ✅ 完了
            結果保存: ✅ 完了
          color: 00FF00
      
  　    # Step 10: 失敗時の通知（Discord Webhook）
      - name: Notify failure to Discord
        if: failure()
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "❌ Phase 1 Screening Failed"
          description: |
            エラーが発生しました
            ログを確認してください
          color: FF0000
