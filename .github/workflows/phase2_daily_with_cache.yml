name: Phase 2 Daily Screening (with Cache)

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl numpy pyarrow

      - name: Fetch EDINET Data
        env:
          EDINETDB_API_KEY: ${{ secrets.EDINETDB_API_KEY }}
        run: |
          python3 edinet_data_fetcher.py
      
      - name: Update J-Quants Cache
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          python3 jquants_data_manager.py
      
      - name: Run Phase 2 Screening
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 advanced_architecture_phase2.py
      
      - name: Upload results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-results
          path: |
            results/
            snapshots/
            logs/
            jquants_cache/
          retention-days: 30
